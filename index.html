<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zodiac Pro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:#000; --s1:#0d1117; --s2:#161b22;
    --bd:rgba(255,255,255,.08); --bdh:rgba(255,255,255,.2);
    --tx:#fff; --mu:#6b7280; --mu2:#374151;
    --bl:#3b82f6; --gn:#22c55e; --rd:#ef4444; --yw:#f59e0b;
  }
  html, body { background:var(--bg); color:var(--tx); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; min-height:100vh; }
  ::-webkit-scrollbar{width:4px} ::-webkit-scrollbar-thumb{background:#1f2937;border-radius:4px}

  @keyframes spin    { to{transform:rotate(360deg)} }
  @keyframes blink   { 0%,100%{opacity:1}50%{opacity:.25} }
  @keyframes fadeUp  { from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none} }
  @keyframes slideUp { from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none} }
  @keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)} }

  .screen { display:none; }
  .screen.active { display:flex; }

  /* ── Idle ── */
  #screen-idle {
    min-height:100vh; flex-direction:column;
    align-items:center; justify-content:center; padding:24px;
  }
  .inner { width:100%; max-width:480px; text-align:center; }

  /* ── Result ── */
  #screen-result { height:100vh; flex-direction:column; overflow:hidden; }

  /* inputs */
  textarea, select {
    width:100%; background:var(--s2); border:1px solid var(--bd); border-radius:12px;
    padding:12px 16px; color:var(--tx); font-size:15px; font-family:inherit;
    outline:none; transition:border-color .2s; display:block;
  }
  textarea:focus, select:focus { border-color:var(--bdh); }
  textarea { resize:none; }
  select option { background:#1f2937; }

  /* buttons */
  .btn { display:inline-flex; align-items:center; justify-content:center; gap:8px; border:none; border-radius:12px; font-family:inherit; font-weight:800; cursor:pointer; transition:all .2s; }
  .btn:disabled { cursor:not-allowed; opacity:.4; }
  .btn-main { background:var(--tx); color:#000; font-size:16px; padding:15px 24px; width:100%; border-radius:14px; letter-spacing:.03em; box-shadow:0 0 28px rgba(255,255,255,.07); }
  .btn-main:not(:disabled):hover { background:#e2e8f0; }
  .btn-icon { width:46px; height:46px; border-radius:10px; background:rgba(255,255,255,.04); border:1px solid var(--bd); flex-direction:column; gap:3px; font-size:13px; }
  .btn-icon:hover { border-color:var(--bdh); }
  .btn-icon .lbl { font-size:8px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--mu); }
  .btn-circle { width:38px; height:38px; border-radius:50%; background:var(--s2); border:none; color:var(--mu); font-size:15px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .2s; }
  .btn-circle:hover { background:rgba(239,68,68,.15); color:var(--rd); }
  .btn-link { background:none; border:none; color:var(--mu2); font-size:13px; cursor:pointer; font-family:inherit; display:inline-flex; align-items:center; gap:6px; transition:color .2s; padding:0; }
  .btn-link:hover { color:var(--mu); }

  /* label */
  .label { display:block; font-size:11px; font-weight:700; color:var(--mu); letter-spacing:.08em; text-transform:uppercase; margin-bottom:8px; }

  /* topbar / footbar */
  .topbar { flex-shrink:0; background:rgba(0,0,0,.92); backdrop-filter:blur(14px); border-bottom:1px solid var(--bd); padding:14px 20px; display:flex; align-items:center; justify-content:space-between; z-index:50; }
  .footbar { flex-shrink:0; background:rgba(8,12,18,.96); backdrop-filter:blur(14px); border-top:1px solid var(--bd); padding:14px 20px; z-index:50; animation:slideUp .35s ease both; }

  /* post list */
  #post-list { flex:1; overflow-y:auto; padding:20px; }

  /* post item */
  .post-item { display:flex; background:var(--s1); border:1px solid var(--bd); border-radius:14px; overflow:hidden; margin-bottom:20px; height:360px; flex-shrink:0; transition:border-color .3s, box-shadow .3s; animation:fadeUp .3s ease both; }
  .post-item.done { border-color:rgba(34,197,94,.35); box-shadow:0 0 18px rgba(34,197,94,.06); }
  .preview-pane { flex:1; background:#000; display:flex; align-items:center; justify-content:center; overflow:hidden; position:relative; }
  .preview-frame { height:88%; aspect-ratio:9/16; position:relative; background:#000; border:1px solid rgba(255,255,255,.04); box-shadow:0 8px 32px rgba(0,0,0,.9); overflow:hidden; }
  .action-bar { width:66px; background:#06080b; border-left:1px solid var(--bd); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; padding:12px 0; }
  .overlay-spin { position:absolute; inset:0; background:rgba(0,0,0,.65); backdrop-filter:blur(4px); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; }
  .overlay-fail { position:absolute; inset:0; background:rgba(0,0,0,.7); display:flex; align-items:center; justify-content:center; }

  /* toast */
  .toast { position:fixed; bottom:96px; left:50%; transform:translateX(-50%); z-index:300; background:rgba(17,24,39,.96); backdrop-filter:blur(10px); color:var(--tx); padding:11px 22px; border-radius:50px; border:1px solid var(--bdh); box-shadow:0 8px 32px rgba(0,0,0,.6); display:flex; align-items:center; gap:9px; font-size:13px; font-weight:700; white-space:nowrap; animation:toastIn .25s ease both; }

  /* error */
  .err { background:rgba(239,68,68,.08); border:1px solid rgba(239,68,68,.25); border-radius:10px; padding:12px 14px; color:#fca5a5; font-size:13px; margin-bottom:14px; text-align:left; line-height:1.5; }

  /* misc */
  .dot { width:7px; height:7px; border-radius:50%; display:inline-block; }
  .spin  { animation:spin 1s linear infinite; }
  .blink { animation:blink 1.4s ease-in-out infinite; }

  /* model selector dropdown (subtle) */
  .model-wrap { display:inline-flex; align-items:center; gap:8px; margin-top:16px; }
  .model-wrap select { background:transparent; border:none; color:var(--mu2); font-size:13px; cursor:pointer; padding:0; width:auto; font-family:inherit; }
  .model-wrap select:focus { border:none; }
  .model-wrap i { color:var(--mu2); font-size:12px; }

  #capture-zone { position:fixed; top:0; left:0; width:1080px; height:1920px; z-index:-100; opacity:0; pointer-events:none; overflow:hidden; }
</style>
</head>
<body>

<!-- ══ IDLE ══ -->
<div id="screen-idle" class="screen active">
  <div class="inner">
    <div style="margin-bottom:36px">
      <div style="font-size:50px;font-weight:900;letter-spacing:-2px;line-height:1;margin-bottom:8px">ZODIAC PRO</div>
      <div style="color:var(--mu);font-size:15px;font-weight:500">Batch Image Generator · Cloudflare AI</div>
    </div>

    <textarea id="inp-text" rows="8" placeholder="Paste your zodiac posts here…"
      style="font-size:16px;line-height:1.6;margin-bottom:14px"></textarea>

    <div id="err-box" class="err" style="display:none"></div>

    <button class="btn btn-main" id="btn-gen" onclick="generate()" style="margin-bottom:14px">
      <i class="fas fa-bolt"></i> GENERATE IMAGES
    </button>

    <!-- subtle model selector -->
    <div class="model-wrap">
      <i class="fas fa-microchip"></i>
      <select id="sel-model">
        <option value="@cf/meta/llama-3.3-70b-instruct-fp8-fast">Llama 3.3 70B ★</option>
        <option value="@cf/meta/llama-4-scout-17b-16e-instruct">Llama 4 Scout 17B</option>
        <option value="@cf/qwen/qwen3-30b-a3b-fp8">Qwen3 30B</option>
        <option value="@cf/mistralai/mistral-small-3.1-24b-instruct">Mistral Small 3.1 24B</option>
        <option value="@cf/meta/llama-3.1-8b-instruct-fast">Llama 3.1 8B</option>
      </select>
    </div>
  </div>
</div>

<!-- ══ RESULT ══ -->
<div id="screen-result" class="screen">
  <div class="topbar">
    <div>
      <div style="font-size:17px;font-weight:900;letter-spacing:-.4px">READY TO SHARE</div>
      <div style="display:flex;align-items:center;gap:6px;margin-top:5px">
        <span class="dot" id="status-dot" style="background:var(--gn)"></span>
        <span style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--mu)" id="status-lbl">0 of 0 Rendered</span>
      </div>
    </div>
    <button class="btn-circle" onclick="reset()"><i class="fas fa-xmark"></i></button>
  </div>

  <div id="post-list">
    <div style="max-width:500px;margin:0 auto" id="list-inner"></div>
  </div>

  <div id="footer-bar" class="footbar" style="display:none">
    <div style="max-width:500px;margin:0 auto">
      <button class="btn btn-main" onclick="downloadAll()">
        <i class="fas fa-cloud-arrow-down" style="font-size:16px"></i>
        <span id="dl-lbl">DOWNLOAD ALL</span>
      </button>
    </div>
  </div>
</div>

<!-- ══ HIDDEN CAPTURE ZONE ══ -->
<div id="capture-zone"></div>

<!-- ══ TOAST ══ -->
<div id="toast" class="toast" style="display:none"></div>

<script>
/* ── State ── */
let posts = [], rsts = [], blobs = [], queue = [], active = new Set();
const CONCUR = 2;
const EMOJIS = ["✨","🌟","🌙","💫","🔮","🧿","🔥","💎","🌈","🛸","🪐","⚡","🍀"];

/* ── Toast ── */
let _tt;
function toast(msg) {
  const el = document.getElementById('toast');
  el.innerHTML = `<i class="fas fa-circle-check" style="color:var(--gn)"></i>${msg}`;
  el.style.display = 'flex';
  clearTimeout(_tt);
  _tt = setTimeout(() => el.style.display = 'none', 3000);
}

/* ── Error ── */
function showErr(msg) {
  const el = document.getElementById('err-box');
  el.innerHTML = `<i class="fas fa-triangle-exclamation" style="margin-right:8px"></i>${msg}`;
  el.style.display = 'block';
}
function hideErr() { document.getElementById('err-box').style.display = 'none'; }

/* ── Screen switch ── */
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
}

/* ── Text helpers ── */
function cleanTitle(t) {
  return (t||'')
    .replace(/([\u2700-\u27BF]|[\uE000-\uF8FF]|\uD83C[\uDC00-\uDFFF]|\uD83D[\uDC00-\uDFFF]|[\u2011-\u26FF]|\uD83E[\uDD10-\uDDFF])/g,'')
    .replace(/[#*]/g,'').trim();
}
function cleanContent(lines) {
  return (lines||[]).map(line => {
    if (line === '') return '';
    let l = line.replace(/#/g,'').trim();
    if (l.length > 0 && !/^(\p{Extended_Pictographic}|\p{Emoji_Presentation})/u.test(l))
      l = `${EMOJIS[Math.floor(Math.random()*EMOJIS.length)]} ${l}`;
    return l;
  });
}
function getLayout(title, content) {
  const c = content.join('').length + title.length;
  let s = {ts:85,cs:45,lh:1.4,px:100,py:320,sep:80};
  if(c>300) s={...s,ts:70,cs:40,sep:70,lh:1.35};
  if(c>500) s={...s,ts:60,cs:36,sep:60,lh:1.3};
  if(c>700) s={...s,ts:50,cs:30,sep:50,lh:1.25};
  if(c>900) s={...s,ts:45,cs:26,sep:40,lh:1.2};
  return s;
}

/* ── Build 1080×1920 card HTML (for capture) ── */
function buildCard(post) {
  const title   = cleanTitle(post.title);
  const content = cleanContent(post.content);
  const ly      = getLayout(title, content);
  const lines   = content.map(line => {
    if (line === '') return `<div style="height:20px"></div>`;
    const html = (line||'').replace(/\*\*(.*?)\*\*/g,'<span style="font-weight:900">$1</span>').replace(/#/g,'');
    return `<p style="font-size:${ly.cs}px;font-weight:500;line-height:${ly.lh};text-align:left;text-shadow:0 2px 4px rgba(0,0,0,.6);margin:0">${html}</p>`;
  }).join('');
  return `<div style="width:1080px;height:1920px;background:#000;color:#fff;padding:${ly.py}px ${ly.px}px;display:flex;flex-direction:column;justify-content:center;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
    <h1 style="font-size:${ly.ts}px;font-weight:900;line-height:1.1;margin-bottom:${ly.sep}px;text-shadow:0 4px 10px rgba(0,0,0,.8);text-align:left">${title}</h1>
    <div style="display:flex;flex-direction:column">${lines}</div>
  </div>`;
}

/* ── Build scaled preview HTML ── */
function buildPreview(post, sc) {
  const title   = cleanTitle(post.title);
  const content = cleanContent(post.content);
  const ly      = getLayout(title, content);
  const lines   = content.map(line => {
    if (line === '') return `<div style="height:${Math.round(20*sc)}px"></div>`;
    const html = (line||'').replace(/\*\*(.*?)\*\*/g,'<span style="font-weight:900">$1</span>').replace(/#/g,'');
    return `<p style="font-size:${(ly.cs*sc).toFixed(1)}px;font-weight:500;line-height:${ly.lh};margin:0;text-shadow:0 1px 2px rgba(0,0,0,.7)">${html}</p>`;
  }).join('');
  return `<div style="padding:${(ly.py*sc).toFixed(1)}px ${(ly.px*sc).toFixed(1)}px;display:flex;flex-direction:column;justify-content:center;height:100%;box-sizing:border-box;background:#000;color:#fff">
    <div style="font-size:${(ly.ts*sc).toFixed(1)}px;font-weight:900;line-height:1.1;margin-bottom:${(ly.sep*sc).toFixed(1)}px;text-shadow:0 2px 6px rgba(0,0,0,.8)">${title}</div>
    <div style="display:flex;flex-direction:column">${lines}</div>
  </div>`;
}

/* ── Build post item DOM ── */
function buildPostItem(post, i) {
  const SC = 0.165;
  const w  = Math.round(1080 * SC);
  const h  = Math.round(1920 * SC);
  const div = document.createElement('div');
  div.className = 'post-item';
  div.id = `item-${i}`;
  div.style.animationDelay = `${i*50}ms`;
  div.innerHTML = `
    <div class="preview-pane">
      <div class="preview-frame">
        <div style="width:${w}px;height:${h}px;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);overflow:hidden">
          ${buildPreview(post, SC)}
        </div>
        <div id="ov-${i}" class="overlay-spin">
          <i class="far fa-clock" style="font-size:20px;color:var(--mu2)"></i>
          <span style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:3px;color:var(--mu2)">Queue</span>
        </div>
      </div>
    </div>
    <div class="action-bar" id="acts-${i}">
      <div style="display:flex;flex-direction:column;align-items:center;gap:5px;color:var(--mu2)">
        <i class="far fa-clock" style="font-size:17px"></i>
        <span style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:2px">Queue</span>
      </div>
    </div>`;
  return div;
}

/* ── Update post item state ── */
function updateItem(i) {
  const st   = rsts[i];
  const item = document.getElementById(`item-${i}`);
  const ov   = document.getElementById(`ov-${i}`);
  const acts = document.getElementById(`acts-${i}`);
  if (!item) return;

  if (st === 'done') item.classList.add('done');

  if (st === 'rend') {
    ov.className = 'overlay-spin';
    ov.innerHTML = `<i class="fas fa-circle-notch spin" style="font-size:26px;color:#60a5fa"></i>
      <span style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:3px;color:#93c5fd">Processing</span>`;
    ov.style.display = 'flex';
  } else if (st === 'fail') {
    ov.className = 'overlay-fail';
    ov.innerHTML = `<i class="fas fa-triangle-exclamation" style="font-size:22px;color:var(--rd)"></i>`;
    ov.style.display = 'flex';
  } else if (st === 'done') {
    ov.style.display = 'none';
  }

  if (st === 'done') {
    acts.innerHTML = `
      <button class="btn btn-icon" onclick="dlOne(${i})">
        <i class="fas fa-download" style="color:var(--bl)"></i><span class="lbl">Save</span>
      </button>
      <button class="btn btn-icon" onclick="shareOne(${i})">
        <i class="fas fa-share-nodes" style="color:var(--gn)"></i><span class="lbl">Share</span>
      </button>
      <button class="btn btn-icon" id="copy-${i}" onclick="copyTitle(${i})">
        <i class="fas fa-copy" style="color:#a78bfa"></i><span class="lbl">Title</span>
      </button>`;
  }
}

/* ── Status bar ── */
function updateStatus() {
  const done    = rsts.filter(s => s === 'done').length;
  const allDone = done === posts.length && posts.length > 0;
  document.getElementById('status-dot').style.background = allDone ? 'var(--bl)' : 'var(--gn)';
  document.getElementById('status-dot').className = 'dot' + (allDone ? '' : ' blink');
  document.getElementById('status-lbl').textContent = `${done} of ${posts.length} Rendered`;
  document.getElementById('footer-bar').style.display = allDone ? 'block' : 'none';
  document.getElementById('dl-lbl').textContent = `DOWNLOAD ALL (${posts.length})`;
  if (allDone) document.getElementById('post-list').style.paddingBottom = '100px';
}

/* ── Render post to PNG ── */
function setRst(i, v) { rsts[i] = v; updateItem(i); updateStatus(); }

async function renderPost(i) {
  setRst(i, 'rend');
  try {
    await sleep(600);
    const el = document.getElementById(`cap-${i}`);
    if (!el) throw new Error('ref missing');
    const cv = await html2canvas(el, {
      scale:2, backgroundColor:'#000', logging:false,
      useCORS:true, allowTaint:true,
      width:1080, height:1920, windowWidth:1080, windowHeight:1920
    });
    if (!cv.width) throw new Error('empty canvas');
    await new Promise((res, rej) => {
      cv.toBlob(blob => {
        if (blob) { blobs[i] = { blob }; setRst(i,'done'); res(); }
        else rej(new Error('blob fail'));
      }, 'image/png');
    });
  } catch(e) {
    console.error(e);
    setRst(i, 'fail');
  }
}

/* ── Batch processor ── */
async function processNext() {
  while (active.size < CONCUR && queue.length > 0) {
    const i = queue.shift();
    if (i === undefined) break;
    active.add(i);
    await sleep(60);
    renderPost(i).then(() => { active.delete(i); processNext(); });
  }
}

/* ── GENERATE ── */
async function generate() {
  const text = document.getElementById('inp-text').value.trim();
  if (!text) return;
  hideErr();

  const model = document.getElementById('sel-model').value;
  const btn   = document.getElementById('btn-gen');
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-circle-notch spin"></i> PROCESSING…';

  try {
    const res = await fetch('/api/format', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, model })
    });

    const data = await res.json();
    if (!res.ok || data.error) throw new Error(data.error || `HTTP ${res.status}`);
    if (!data.posts?.length) throw new Error('No posts generated. Try simplifying your input.');

    posts  = data.posts;
    rsts   = new Array(posts.length).fill('wait');
    blobs  = new Array(posts.length).fill(null);
    queue  = posts.map((_,i) => i);
    active = new Set();

    // Build capture zone
    const zone = document.getElementById('capture-zone');
    zone.innerHTML = posts.map((p,i) =>
      `<div id="cap-${i}" style="width:1080px;height:1920px;background:#000;position:absolute;top:0;left:0">${buildCard(p)}</div>`
    ).join('');

    // Build result list
    const list = document.getElementById('list-inner');
    list.innerHTML = '';
    posts.forEach((p,i) => list.appendChild(buildPostItem(p,i)));
    updateStatus();
    show('result');
    processNext();

  } catch(e) {
    showErr(e.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-bolt"></i> GENERATE IMAGES';
  }
}

/* ── Download / Share ── */
async function dlOne(i) {
  const b = blobs[i]?.blob; const p = posts[i];
  if (!b || !p) return;
  try { await navigator.clipboard.writeText(p.title); } catch(e) {}
  triggerDl(b, `zodiac-${p.title.slice(0,14).replace(/[^a-z0-9]/gi,'-')}-${Date.now()}.png`);
  toast('Image saved & title copied!');
}

async function shareOne(i) {
  const b = blobs[i]?.blob; const p = posts[i];
  if (!b || !p) return;
  try { await navigator.clipboard.writeText(p.title); } catch(e) {}
  const file = new File([b], `zodiac-${Date.now()}.png`, {type:'image/png'});
  if (navigator.share && navigator.canShare?.({files:[file]})) {
    try { await navigator.share({files:[file], title:p.title, text:`${p.title} #zodiac`}); toast('Shared!'); }
    catch(e) { if (e.name !== 'AbortError') toast('Share failed.'); }
  } else { toast('Sharing not supported — use Download.'); }
}

async function copyTitle(i) {
  const p = posts[i]; if (!p) return;
  try { await navigator.clipboard.writeText(p.title); } catch(e) {}
  const btn = document.getElementById(`copy-${i}`);
  if (btn) {
    btn.innerHTML = `<i class="fas fa-check" style="color:var(--yw)"></i><span class="lbl">Done</span>`;
    setTimeout(() => { btn.innerHTML=`<i class="fas fa-copy" style="color:#a78bfa"></i><span class="lbl">Title</span>`; }, 2000);
  }
  toast('Title copied!');
}

async function downloadAll() {
  toast('Starting batch download…');
  for (let i = 0; i < blobs.length; i++) {
    const b = blobs[i]; const p = posts[i];
    if (b?.blob && p) {
      triggerDl(b.blob, `zodiac-${p.title.slice(0,14).replace(/[^a-z0-9]/gi,'-')}-${i+1}.png`);
      await sleep(500);
    }
  }
  toast(`All ${blobs.filter(Boolean).length} images downloaded!`);
}

function triggerDl(blob, name) {
  const url = URL.createObjectURL(blob);
  const a = Object.assign(document.createElement('a'), { href:url, download:name });
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

/* ── Reset ── */
function reset() {
  posts=[]; rsts=[]; blobs=[]; queue=[]; active=new Set();
  document.getElementById('capture-zone').innerHTML = '';
  document.getElementById('list-inner').innerHTML = '';
  document.getElementById('inp-text').value = '';
  document.getElementById('post-list').style.paddingBottom = '20px';
  hideErr();
  show('idle');
}

function sleep(ms) { return new Promise(r => setTimeout(r,ms)); }
</script>
